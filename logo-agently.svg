<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07C160"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F12"/>
      <stop offset="100%" stop-color="#1A1A1F"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="300" height="300" rx="72" fill="url(#bg)"/>

  <!-- 装饰光晕 -->
  <circle cx="240" cy="60" r="42" fill="#07C160" opacity="0.08"/>

  <!-- A 字标识 -->
  <g transform="translate(150, 130)">
    <path d="M-63 69 L-3 -69" stroke="url(#accent)" stroke-width="21" stroke-linecap="round"/>
    <path d="M63 69 L3 -69" stroke="url(#accent)" stroke-width="21" stroke-linecap="round"/>
    <line x1="-36" y1="18" x2="36" y2="18" stroke="url(#accent)" stroke-width="21" stroke-linecap="round"/>
    <circle cx="0" cy="-69" r="13" fill="#FFFFFF"/>
    <circle cx="0" cy="18" r="9" fill="#FFFFFF"/>
  </g>

  <!-- 品牌名 -->
  <text x="150" y="252" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="700" fill="#E5E7EB" letter-spacing="4">AGENTLY</text>
</svg>
