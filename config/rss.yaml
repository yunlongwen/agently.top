rss:
  enabled: true
  global_max_age_days: 3
  request:
    timeout: 10
    retries: 2
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  sources:
    - id: "rss-qbitai"
      name: "量子位"
      url: "https://www.qbitai.com/feed"
      category: "AI 快讯"
      display_priority: "high"
      max_age_days: 2
      max_items: 10

    - id: "rss-geekpark"
      name: "极客公园"
      url: "https://www.geekpark.net/rss"
      category: "科技动态"
      display_priority: "medium"
      max_age_days: 2
      max_items: 10

    - id: "rss-jiqizhixin"
      name: "机器之心"
      url: "https://www.jiqizhixin.com/rss"
      category: "AI 快讯"
      display_priority: "high"
      max_age_days: 2
      max_items: 10

    - id: "rss-36kr"
      name: "36kr"
      url: "https://36kr.com/feed"
      category: "科技动态"
      display_priority: "medium"
      max_age_days: 2
      max_items: 10

    - id: "rss-solidot"
      name: "Solidot"
      url: "https://www.solidot.org/index.rss"
      category: "开源科技"
      display_priority: "medium"
      max_age_days: 2
      max_items: 10

    - id: "rss-oschina"
      name: "开源中国"
      url: "https://www.oschina.net/news/rss"
      category: "开源趋势"
      display_priority: "medium"
      max_age_days: 2
      max_items: 10

    - id: "rss-v2ex-tech"
      name: "V2EX 技术"
      url: "https://www.v2ex.com/feed/tab/tech.xml"
      category: "社区讨论"
      display_priority: "high"
      fetch_interval_hours: 1
      max_age_days: 1
      max_items: 15

    - id: "rss-arxiv"
      name: "arXiv AI 论文"
      url: "https://rsshub.app/arxiv/query/AI"
      category: "论文"
      display_priority: "low"
      enabled: false
      fetch_interval_hours: 6
      max_age_days: 3
      max_items: 5
