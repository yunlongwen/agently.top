frontend:
  source_groups:
    - key: "core"
      label: "核心源"
      display_priority: "high"
      default_expanded: true
    - key: "extended"
      label: "扩展源"
      display_priority: "medium"
      default_expanded: false
    - key: "optional"
      label: "可选源"
      display_priority: "low"
      default_expanded: false

source_schedule:
  default_intervals:
    high: 8h
    medium: 8h
    low: 8h
  overrides:
    hacker-news: 1h
    linux-do: 1h
    rss-qbitai: 2h
    rss-36kr: 2h
    rss-solidot: 2h
    rss-oschina: 2h
    github-daily: 6h
    github-weekly: 1d
    openai: 6h
    anthropic: 6h
    infoq: 6h
    rss-arxiv: 6h
    # 2026-06-22 禁用：rss-v2ex-tech（网络不可达）、rss-jiqizhixin（无 RSS 端点）、
    # rss-geekpark（www.geekpark.net 443 超时）。
